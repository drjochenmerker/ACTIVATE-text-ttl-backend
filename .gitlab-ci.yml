stages:
    - lint
    - build
    - test

cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
        - node_modules/

lint:
    stage: lint
    image: node:lts-bookworm-slim
    script:
        - npm ci
        - npm run lint

build:
    stage: build
    image: node:lts-bookworm-slim
    script:
        - npm ci
        - npm run build

test-docker:
    stage: test
    image: docker:latest
    services:
        - docker:dind
    script:
        - docker build -t feedback-parser:test .
        - docker run -d --name feedback-parser-test feedback-parser:test
        - sleep 5
        - docker ps -a --filter name=feedback-parser-test
        - |
            STATUS=$(docker inspect -f '{{.State.Status}}' feedback-parser-test)
            if [ "$STATUS" != "running" ]; then
                echo "ERROR: Container is not running!"
                docker logs feedback-parser-test
                exit 1
            fi
        - sleep 10
        - |
            STATUS=$(docker inspect -f '{{.State.Status}}' feedback-parser-test)
            RESTARTS=$(docker inspect -f '{{.RestartCount}}' feedback-parser-test)
            if [ "$STATUS" != "running" ] || [ "$RESTARTS" -gt "0" ]; then
                echo "ERROR: Container crashed or restarted!"
                docker logs feedback-parser-test
                exit 1
            fi
    after_script:
        - docker stop feedback-parser-test || true
        - docker rm feedback-parser-test || true
